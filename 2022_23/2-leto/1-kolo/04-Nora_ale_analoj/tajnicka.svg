           x="-4478.4971"
           y="-1615.4233"
           id="tspan337">Heslo sa končí na písmeno H.</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-1537.037"
           id="tspan579">- skutok, konanie</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-1458.6506"
           id="tspan581">- pohrebná hostina</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-1380.2642"
           id="tspan583">- náter slúžiaci na ochranu povrchu</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-1301.8778"
           id="tspan585">- oprávnená požiadavka, právo</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-1223.4915"
           id="tspan589">- </tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-1145.1051"
           id="tspan591">- pravidelný jav, kde mesiac neodráža na zem žiadne slnečné lúče</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-1066.7188"
           id="tspan593">- tradičné zariadenie na tepelnú úpravu</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-988.33234"
           id="tspan595">- najbežnejší materiál na výrobu fliaš</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-909.94598"
           id="tspan597">- nemelodický veľmi hlasný hluk</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-831.55963"
           id="tspan599">- dofotoshopovanie fotografie po zhotovení</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-753.17322"
           id="tspan601">- hĺbkové narušenie povrchu alebo predmetu iným, ostrým predmetom</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-674.78687"
           id="tspan603">- používaj stoličku</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-596.40051"
           id="tspan605">- cenný papier, banková poukážka</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-518.0141"
           id="tspan607">- pohyb nahor odrazom nôh od zeme</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-439.62775"
           id="tspan609">- masívny kameň nárečovo</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-361.24136"
           id="tspan611">- mliečny výrobok</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-282.85498"
           id="tspan613">- alternatíva k citoslovcu výskoku, napríklad pri riskovaní</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-204.46861"
           id="tspan615">- považuj za pravdivé, nie nutne z racionálnych dôvodov</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-126.08224"
           id="tspan617">- úvodný akt futbalového zápasu</tspan><tspan
           sodipodi:role="line"
           style="text-align:start;text-anchor:start;stroke-width:1.16162"
           x="-4478.4971"
           y="-47.695869"
