;font-variant-caps:normal;font-variant-ligatures:normal;font-variant-numeric:normal;line-height:1.25;shape-inside:url(#rect1752);white-space:pre" xml:space="preserve"><tspan x="169.91804" y="115.64661"><tspan style="shape-inside:url(#rect1752)">Čo mám
</tspan></tspan><tspan x="175.8347" y="142.31324"><tspan style="shape-inside:url(#rect1752)">doniesť
</tspan></tspan><tspan x="154.27744" y="168.97986"><tspan style="shape-inside:url(#rect1752)">z obchodu?
</tspan></tspan></text><text transform="translate(266 77.7)" x="50.987919" text-align="center" style="font-feature-settings:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-variant-numeric:normal;line-height:1.25;shape-inside:url(#rect1752-3);white-space:pre" xml:space="preserve"><tspan x="154.14857" y="115.64661"><tspan style="shape-inside:url(#rect1752-3)">Hrach, špagety,
</tspan></tspan><tspan x="157.45065" y="142.31324"><tspan style="shape-inside:url(#rect1752-3)">párky a jablká.</tspan></tspan></text><text transform="translate(-42 156)" x="50.987919" text-align="center" style="font-feature-settings:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-variant-numeric:normal;line-height:1.25;shape-inside:url(#rect1752-3-7);white-space:pre" xml:space="preserve"><tspan x="187.92004" y="115.64661"><tspan style="shape-inside:url(#rect1752-3-7)">Ja si poprosím
</tspan></tspan><tspan x="193.56587" y="142.31324"><tspan style="shape-inside:url(#rect1752-3-7)">niečo zdravé,
</tspan></tspan><tspan x="211.83146" y="168.97986"><tspan style="shape-inside:url(#rect1752-3-7)">pomaranč
</tspan></tspan><tspan x="213.18563" y="195.64649"><tspan style="shape-inside:url(#rect1752-3-7)">a uhorku.</tspan></tspan></text><text transform="translate(255 224)" x="50.987919" text-align="center" style="font-feature-settings:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-variant-numeric:normal;line-height:1.25;shape-inside:url(#rect1752-3-3);white-space:pre" xml:space="preserve"><tspan x="174.22145" y="115.64661"><tspan style="shape-inside:url(#rect1752-3-3)">Mne postačí
</tspan></tspan><tspan x="154.08607" y="142.31324"><tspan style="shape-inside:url(#rect1752-3-3)">rožok a mango.</tspan></tspan></text><text transform="translate(-14.7 327)" x="50.987919" text-align="center" style="font-feature-settings:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-variant-numeric:normal;line-height:1.25;shape-inside:url(#rect1752-3-2);white-space:pre" xml:space="preserve"><tspan x="181.77353" y="115.64661"><tspan style="shape-inside:url(#rect1752-3-2)">Nezabudni
</tspan></tspan><tspan x="154.63294" y="142.31324"><tspan style="shape-inside:url(#rect1752-3-2)">kúpiť aj orechy.</tspan></tspan></text><text transform="translate(209 360)" x="50.987919" text-align="center" style="font-feature-settings:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-variant-numeric:normal;line-height:1.25;shape-inside:url(#rect1752-3-27);white-space:pre" xml:space="preserve"><tspan x="193.82207" y="115.64661"><tspan style="shape-inside:url(#rect1752-3-27)">Na víkend ešte
</tspan></tspan><tspan x="155.47838" y="142.31324"><tspan style="shape-inside:url(#rect1752-3-27)">potrebujeme tarhoňu,
</tspan></tspan><tspan x="192.17624" y="168.97986"><tspan style="shape-inside:url(#rect1752-3-27)">klobásu, čierne
</tspan></tspan><tspan x="174.48876" y="195.64649"><tspan style="shape-inside:url(#rect1752-3-27)">korenie a čerešne.</tspan></tspan></text><text transform="translate(-17.2 472)" x="50.987919" text-align="center" style="font-feature-settings:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-variant-numeric:normal;line-height:1.25;shape-inside:url(#rect1752-3-36);white-space:pre" xml:space="preserve"><tspan x="174.0652" y="115.64661"><tspan style="shape-inside:url(#rect1752-3-36)">Ja si prosím
</tspan></tspan><tspan x="153.54961" y="142.31324"><tspan style="shape-inside:url(#rect1752-3-36)">žemľu s rascou.</tspan></tspan></text><text transform="translate(267 533)" x="50.987919" text-align="center" style="font-feature-settings:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-variant-numeric:normal;line-height:1.25;shape-inside:url(#rect1752-3-6);white-space:pre" xml:space="preserve"><tspan x="192.63098" y="115.64661"><tspan style="shape-inside:url(#rect1752-3-6)">A tiež bagetu,
</tspan></tspan><tspan x="160.1102" y="142.31324"><tspan style="shape-inside:url(#rect1752-3-6)">hrozno a pelendrek.</tspan></tspan></text></g></svg>
